<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BLACK IRON | Totem de Acesso</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="totem">
        <div class="logo">⛭</div>
        <h1>BLACK IRON</h1>
        <div class="linha"></div>

        <input type="text" id="display" placeholder="000.000.000-00" readonly inputmode="numeric">

        <div class="teclado">
            <button class="n" data-num="1">1</button>
            <button class="n" data-num="2">2</button>
            <button class="n" data-num="3">3</button>
            <button class="n" data-num="4">4</button>
            <button class="n" data-num="5">5</button>
            <button class="n" data-num="6">6</button>
            <button class="n" data-num="7">7</button>
            <button class="n" data-num="8">8</button>
            <button class="n" data-num="9">9</button>
            <button class="limpar" id="btnLimpar">LIMPAR</button>
            <button class="n" data-num="0">0</button>
            <button class="ok" id="btnOk">OK</button>
        </div>

        <div id="msg-area">
            <p id="msg">INSIRA SEU CPF</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
